name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Core unit tests
        run: ./gradlew :airlock-core:test

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Assert no INTERNET permission (the core guarantee)
        run: |
          set -e
          AAPT=$(ls "$ANDROID_HOME"/build-tools/*/aapt2 | sort -V | tail -1)
          if "$AAPT" dump permissions app/build/outputs/apk/debug/app-debug.apk | grep -qi 'android.permission.INTERNET'; then
            echo "FAIL: INTERNET permission present"; exit 1
          fi
          echo "PASS: no INTERNET permission"

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
